<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>延世韩国语单词记忆</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f5f7fa;
  --card-bg: #ffffff;
  --primary: #4a90d9;
  --primary-dark: #357abd;
  --success: #52c41a;
  --danger: #ff4d4f;
  --text: #333;
  --text-light: #888;
  --border: #e8e8e8;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ===== Header ===== */
.header {
  background: var(--card-bg);
  padding: 16px 24px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header h1 { font-size: 20px; font-weight: 600; }

.header-actions { display: flex; gap: 8px; }

.btn-icon {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text);
  transition: all 0.2s;
}

.btn-icon:hover {
  background: var(--bg);
  border-color: var(--primary);
  color: var(--primary);
}

/* ===== Chapter List ===== */
.chapter-list {
  max-width: 600px;
  margin: 0 auto;
  padding: 20px 24px 100px;
}

.chapter-card {
  background: var(--card-bg);
  border-radius: 14px;
  box-shadow: var(--shadow);
  padding: 18px 20px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 16px;
}

.chapter-card:hover {
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  transform: translateY(-1px);
}

.chapter-num {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: var(--primary);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  flex-shrink: 0;
}

.chapter-info { flex: 1; }

.chapter-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 4px;
}

.chapter-meta {
  font-size: 13px;
  color: var(--text-light);
  display: flex;
  gap: 12px;
}

.chapter-progress-bar {
  height: 4px;
  background: #e9ecef;
  border-radius: 2px;
  overflow: hidden;
  margin-top: 8px;
  display: flex;
}

.chapter-progress-fill {
  height: 100%;
  background: var(--success);
  border-radius: 2px;
  transition: width 0.4s;
}

.chapter-arrow {
  font-size: 18px;
  color: var(--text-light);
  flex-shrink: 0;
}

/* ===== Stats Bar ===== */
.stats-bar {
  display: flex;
  gap: 12px;
  padding: 16px 24px;
  overflow-x: auto;
}

.stat-card {
  flex: 1;
  min-width: 100px;
  background: var(--card-bg);
  border-radius: 12px;
  padding: 14px 16px;
  box-shadow: var(--shadow);
  text-align: center;
}

.stat-card .number { font-size: 28px; font-weight: 700; line-height: 1.2; }
.stat-card .label { font-size: 12px; color: var(--text-light); margin-top: 4px; }
.stat-new .number { color: var(--primary); }
.stat-learning .number { color: #faad14; }
.stat-reviewing .number { color: #722ed1; }
.stat-mastered .number { color: var(--success); }

/* ===== Progress Bar ===== */
.progress-wrap { padding: 0 24px 16px; }

.progress-bar-bg {
  height: 6px;
  background: #e9ecef;
  border-radius: 3px;
  overflow: hidden;
  display: flex;
}

.progress-segment { height: 100%; transition: width 0.5s ease; }
.seg-mastered { background: var(--success); }
.seg-reviewing { background: #722ed1; }
.seg-learning { background: #faad14; }

/* ===== Main Content ===== */
.main { max-width: 520px; margin: 0 auto; padding: 0 24px 100px; }

/* ===== Card ===== */
.card-container { perspective: 1000px; margin: 20px 0; }

.card {
  background: var(--card-bg);
  border-radius: 16px;
  box-shadow: var(--shadow);
  min-height: 280px;
  position: relative;
  transition: transform 0.5s;
  transform-style: preserve-3d;
  cursor: pointer;
}

.card.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  border-radius: 16px;
}

.card-front { background: var(--card-bg); }

.card-back {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  transform: rotateY(180deg);
}

.card-korean {
  font-size: 48px;
  font-weight: 700;
  text-align: center;
  line-height: 1.3;
  word-break: break-all;
}

.card-hint { margin-top: 16px; font-size: 14px; color: var(--text-light); }
.card-chinese { font-size: 32px; font-weight: 600; text-align: center; line-height: 1.4; }
.card-chinese-label { font-size: 14px; opacity: 0.7; margin-bottom: 12px; }

/* ===== Buttons ===== */
.action-buttons { display: flex; gap: 12px; margin-top: 20px; }

.btn {
  flex: 1;
  padding: 16px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-show { background: var(--primary); color: white; }
.btn-show:hover { background: var(--primary-dark); }
.btn-know { background: var(--success); color: white; }
.btn-know:hover { background: #45a816; }
.btn-unknow { background: var(--danger); color: white; }
.btn-unknow:hover { background: #e04040; }
.btn:active { transform: scale(0.97); }

/* ===== Session Complete ===== */
.session-complete { text-align: center; padding: 60px 24px; }
.session-complete h2 { font-size: 24px; margin-bottom: 12px; }
.session-complete p { color: var(--text-light); margin-bottom: 24px; }

.btn-primary {
  background: var(--primary);
  color: white;
  border: none;
  padding: 14px 32px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}

.btn-primary:hover { background: var(--primary-dark); }

/* ===== Settings Modal ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-overlay.active { display: flex; }

.modal {
  background: var(--card-bg);
  border-radius: 16px;
  padding: 28px;
  width: 90%;
  max-width: 420px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
}

.modal h2 { font-size: 20px; margin-bottom: 20px; }
.setting-group { margin-bottom: 20px; }
.setting-group label { display: block; font-size: 14px; color: var(--text-light); margin-bottom: 8px; }
.setting-group input[type="range"] { width: 100%; }
.range-value { text-align: center; font-size: 20px; font-weight: 700; color: var(--primary); margin-top: 4px; }

.modal-actions { display: flex; gap: 12px; margin-top: 24px; }

.btn-secondary {
  background: var(--bg); color: var(--text);
  border: 1px solid var(--border);
  padding: 12px 20px; border-radius: 10px;
  font-size: 14px; cursor: pointer; flex: 1;
}

.btn-danger {
  background: var(--danger); color: white;
  border: none; padding: 12px 20px;
  border-radius: 10px; font-size: 14px; cursor: pointer; flex: 1;
}

/* ===== History Modal ===== */
.history-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

.history-table th, .history-table td {
  padding: 10px 8px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

.history-table th {
  background: var(--bg);
  font-weight: 600;
  font-size: 13px;
  color: var(--text-light);
  position: sticky;
  top: 0;
}

.history-table tr:hover { background: #f8f9ff; }

.rate-good { color: var(--success); font-weight: 600; }
.rate-ok { color: #faad14; font-weight: 600; }
.rate-bad { color: var(--danger); font-weight: 600; }

.no-history {
  text-align: center;
  color: var(--text-light);
  padding: 40px 20px;
  font-size: 14px;
}

/* ===== Back Button ===== */
.back-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 14px;
  color: var(--primary);
  padding: 4px 0;
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 12px;
}

.back-btn:hover { text-decoration: underline; }

/* ===== Keyboard Hints ===== */
.keyboard-hints { text-align: center; padding: 12px; font-size: 12px; color: var(--text-light); }
.keyboard-hints kbd {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 6px; font-family: inherit; font-size: 11px;
}

/* ===== Status Tag ===== */
.card-status {
  position: absolute; top: 16px; right: 16px;
  font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: 500;
}

.tag-new { background: #e6f7ff; color: #1890ff; }
.tag-review { background: #f9f0ff; color: #722ed1; }

/* ===== Chapter Header ===== */
.chapter-header {
  text-align: center;
  padding: 16px 0 8px;
  font-size: 14px;
  color: var(--text-light);
}

.chapter-header strong { color: var(--primary); }

/* ===== Today Review Banner ===== */
.today-review-banner {
  margin: 0 24px 8px;
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  border-radius: 14px;
  padding: 18px 20px;
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

.today-review-banner:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(245, 87, 108, 0.3);
}

.today-review-banner.today-done {
  background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
  cursor: default;
}

.today-review-banner.today-done:hover {
  transform: none;
  box-shadow: none;
}

.streak-banner {
  text-align: center;
  padding: 10px 16px;
  margin-bottom: 16px;
  border-radius: 10px;
  background: linear-gradient(135deg, #fff7e6 0%, #ffe7ba 100%);
  color: #d46b08;
  font-size: 15px;
}

.today-review-title {
  font-size: 13px;
  opacity: 0.85;
  margin-bottom: 4px;
}

.today-review-count {
  font-size: 18px;
  font-weight: 600;
}

.today-review-count strong {
  font-size: 24px;
}

.today-review-sub {
  font-size: 13px;
  opacity: 0.85;
  margin-top: 4px;
}

.today-review-overflow {
  font-size: 12px;
  opacity: 0.75;
  margin-top: 4px;
}

.today-review-est {
  font-size: 13px;
  opacity: 0.85;
  font-weight: 400;
}

.today-review-go {
  font-size: 14px;
  font-weight: 600;
  background: rgba(255,255,255,0.25);
  padding: 8px 16px;
  border-radius: 8px;
  flex-shrink: 0;
}

/* ===== Due Badge ===== */
.due-badge {
  background: #fff1f0;
  color: #ff4d4f;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 600;
}

/* ===== Leech Banner ===== */
.leech-banner {
  margin: 0 24px 8px;
  background: linear-gradient(13deg, #f6d365 0%, #fda085 100%);
  border-radius: 14px;
  padding: 18px 20px;
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.leech-banner:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(253,160,133,0.3);
}
.leech-banner-title { font-size: 13px; opacity: 0.85; margin-bottom: 4px; }
.leech-banner-count { font-size: 18px; font-weight: 600; }
.leech-banner-count strong { font-size: 24px; }
.leech-banner-go { font-size: 14px; font-weight: 600; background: rgba(255,255,255,0.25); padding: 8px 16px; border-radius: 8px; flex-shrink: 0; }

.tag-leech { background: #fff1f0; color: #ff4d4f; }
.tag-mastered { background: #f6ffed; color: #52c41a; }

/* ===== Responsive ===== */
@media (max-width: 480px) {
  .card-korean { font-size: 36px; }
  .card-chinese { font-size: 24px; }
  .stats-bar { padding: 12px 16px; gap: 8px; }
  .stat-card { padding: 10px 12px; }
  .stat-card .number { font-size: 22px; }
  .main { padding: 0 16px 100px; }
  .chapter-list { padding: 16px 16px 100px; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1 id="headerTitle">韩语单词记忆</h1>
  <div class="header-actions">
    <span id="syncIndicator" style="font-size:14px;margin-right:4px;transition:opacity 0.3s;opacity:0.6;">☁️</span>
    <button class="btn-icon" onclick="openHistory()">📊 历史</button>
    <button class="btn-icon" onclick="openSettings()">⚙ 设置</button>
  </div>
</div>

<!-- App Container -->
<div id="app"></div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>学习设置</h2>
    <div class="setting-group">
      <label>每日新词数量</label>
      <input type="range" id="newWordCount" min="5" max="50" step="5" value="10" oninput="updateRangeDisplay()">
      <div class="range-value" id="rangeValue">10 个</div>
    </div>
    <div class="setting-group">
      <label>云同步 Token（填一次即可自动同步）</label>
      <input type="text" id="syncTokenInput" placeholder="ghp_开头的 Personal Access Token" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;">
      <div style="margin-top:6px;font-size:12px;color:var(--text-light);" id="syncStatus"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeSettings()">关闭</button>
      <button class="btn-danger" onclick="resetProgress()">重置全部进度</button>
    </div>
    <div class="modal-actions" style="margin-top:8px;">
      <button class="btn-secondary" onclick="exportProgress()">导出进度</button>
      <button class="btn-secondary" onclick="document.getElementById('importFile').click()">导入进度</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importProgress(event)">
    </div>
  </div>
</div>

<!-- History Modal -->
<div class="modal-overlay" id="historyModal">
  <div class="modal">
    <h2>学习历史</h2>
    <div id="historyContent"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeHistory()">关闭</button>
    </div>
  </div>
</div>

// ===== SRS Constants (simplified FSRS) =====
const DAY = 86400 * 1000;
const MINUTE = 60 * 1000;

// ===== Learning Streak =====
function getStreak() {
  // Count consecutive days with at least one session, ending at today or yesterday
  if (sessionHistory.length === 0) return 0;
  const days = new Set();
  for (const h of sessionHistory) {
    days.add(h.date);
  }
  const today = new Date();
  let streak = 0;
  // Check from today backwards
  for (let d = 0; d < 365; d++) {
    const check = new Date(today);
    check.setDate(check.getDate() - d);
    const key = check.toISOString().slice(0, 10);
    if (days.has(key)) {
      streak++;
    } else if (d === 0) {
      // Today not yet studied — streak still valid if yesterday was
      continue;
    } else {
      break;
    }
  }
  return streak;
}

// ===== Persistence =====
function loadProgress() {
  try { progress = JSON.parse(localStorage.getItem('korean_vocab_progress') || '{}'); }
  catch { progress = {}; }

  // Auto-migrate old format (correctCount → stability/difficulty)
  let needsMigration = false;
  for (const [key, val] of Object.entries(progress)) {
    if (key.startsWith('_')) continue;
    if (val && val.correctCount !== undefined && val.stability === undefined) {
      needsMigration = true;
      break;
    }
  }
  if (needsMigration) {
    migrateProgress();
    saveProgress();
  }
}

function migrateProgress() {
  const OLD_INTERVALS = [60*1000, 10*60*1000, 60*60*1000, 24*60*60*1000, 3*24*60*60*1000, 7*24*60*60*1000];
  for (const [key, val] of Object.entries(progress)) {
    if (key.startsWith('_')) continue;
    if (!val || val.correctCount === undefined || val.stability !== undefined) continue;

    const oldCount = val.correctCount || 0;
    const oldIntervalDays = oldCount > 0
      ? OLD_INTERVALS[Math.min(oldCount - 1, OLD_INTERVALS.length - 1)] / DAY
      : S0_AGAIN;
    const approxStability = Math.max(S0_AGAIN, oldIntervalDays * 1.2);

    progress[key] = {
      status: val.status === 'mastered' ? 'mastered'
            : val.status === 'reviewing' ? 'reviewing'
            : 'learning',
      stability: approxStability,
      difficulty: 0.3,
      nextReview: val.nextReview || 0,
      lastReview: val.lastReview || 0,
      reps: oldCount,
      lapses: 0,
      streak: oldCount,
    };
  }
}

// ===== Cloud Sync =====
function showSyncStatus(status) {
  const el = document.getElementById('syncIndicator');
  if (!el) return;
  if (status === 'syncing') { el.textContent = '☁️↑'; el.style.opacity = '1'; el.style.color = '#faad14'; }
  else if (status === 'synced') { el.textContent = '☁️✓'; el.style.opacity = '1'; el.style.color = '#52c41a'; setTimeout(() => { el.textContent = '☁️'; el.style.opacity = '0.6'; el.style.color = ''; }, 2000); }
  else if (status === 'error') { el.textContent = '☁️✗'; el.style.opacity = '1'; el.style.color = '#ff4d4f'; setTimeout(() => { el.textContent = '☁️'; el.style.opacity = '0.6'; el.style.color = ''; }, 3000); }
}

async function syncFromCloud() {
  if (!syncToken) return;
  showSyncStatus('syncing');
  const { owner, repo, path } = SYNC_CONFIG;
  const url = 'https://api.github.com/repos/' + owner + '/' + repo + '/contents/' + path;
  try {
    const resp = await fetch(url, {
      headers: { 'Authorization': 'token ' + syncToken, 'Accept': 'application/vnd.github+json' }
    });
    if (resp.status === 404) {
      // File doesn't exist yet on cloud, that's fine
      syncSha = null;
      showSyncStatus('synced');
      return;
    }
    if (!resp.ok) {
      console.warn('Cloud download failed, status:', resp.status);
      showSyncStatus('error');
      return;
    }
    const data = await resp.json();
    syncSha = data.sha;
    const cloud = JSON.parse(atob(data.content));
    if (cloud.progress) {
      // Check if cloud has a reset timestamp that supersedes local data
      const cloudResetTs = cloud.progress._resetTs || 0;
      const localResetTs = progress._resetTs || 0;
      if (cloudResetTs > localResetTs) {
        // Cloud was reset more recently — adopt cloud's reset
        progress = {};
        progress._resetTs = cloudResetTs;
      }
      for (const [key, val] of Object.entries(cloud.progress)) {
        // Skip corrupted keys that don't match any word in CHAPTERS
        if (!key.startsWith('_') && !VALID_WORD_KEYS.has(key)) continue;
        // Chapter metadata (_chN): take the higher newIndex
        if (key.startsWith('_ch')) {
          const local = progress[key];
          if (!local || (val.newIndex || 0) > (local.newIndex || 0)) {
            progress[key] = val;
          }
          continue;
        }
        const local = progress[key];
        if (!local || (val.lastReview || 0) > (local.lastReview || 0)) {
          progress[key] = val;
        }
      }
    }
    if (cloud.history && cloud.history.length > 0) {
      // Merge by timestamp: keep all unique sessions from both local and cloud
      const seen = new Set(sessionHistory.map(h => h.timestamp || `${h.date}|${h.chapter}|${h.total}`));
      for (const h of cloud.history) {
        const key = h.timestamp || `${h.date}|${h.chapter}|${h.total}`;
        if (!seen.has(key)) {
          sessionHistory.push(h);
          seen.add(key);
        }
      }
      // Sort by timestamp
      sessionHistory.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
    }
    localStorage.setItem('korean_vocab_progress', JSON.stringify(progress));
    localStorage.setItem('korean_vocab_history', JSON.stringify(sessionHistory));
    showSyncStatus('synced');
  } catch (e) {
    console.warn('Cloud sync failed:', e);
    showSyncStatus('error');
  }
}

function scheduleCloudSync() {
  if (syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(syncToCloud, 3000);
}

async function syncToCloud() {
  if (!syncToken || syncInFlight) return;
  syncInFlight = true;
  showSyncStatus('syncing');
  const { owner, repo, path } = SYNC_CONFIG;
  const url = 'https://api.github.com/repos/' + owner + '/' + repo + '/contents/' + path;
  const content = JSON.stringify({ progress, history: sessionHistory }, null, 2);

  // If syncSha is null, we need to fetch it first (file may exist from another device)
  if (!syncSha) {
    try {
      const checkResp = await fetch(url, {
        headers: { 'Authorization': 'token ' + syncToken, 'Accept': 'application/vnd.github+json' }
      });
      if (checkResp.ok) {
        const checkData = await checkResp.json();
        syncSha = checkData.sha;
      }
    } catch (e) { /* file doesn't exist, that's fine */ }
  }

  try {
    const body = {
      message: 'update progress',
      content: btoa(unescape(encodeURIComponent(content)))
    };
    if (syncSha) body.sha = syncSha;

    const resp = await fetch(url, {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + syncToken,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github+json'
      },
      body: JSON.stringify(body)
    });
    if (resp.ok) {
      const result = await resp.json();
      syncSha = result.content.sha;
      showSyncStatus('synced');
    } else {
      const errText = await resp.text();
      console.warn('Cloud upload failed:', resp.status, errText);
      // On 409 Conflict (stale sha), reset syncSha so next attempt re-fetches it
      if (resp.status === 409) syncSha = null;
      showSyncStatus('error');
    }
  } catch (e) {
    console.warn('Cloud save failed:', e);
    showSyncStatus('error');
  } finally {
    syncInFlight = false;
  }
}

// ===== Chapter Stats =====
function getChapterStats(chapterIdx) {
  const words = CHAPTERS[chapterIdx].words;
  const s = { newCount: 0, learning: 0, reviewing: 0, mastered: 0, leech: 0, total: words.length };
  for (const w of words) {
    const p = progress[w.korean];
    if (!p) { s.newCount++; continue; }
    if (p.status === 'mastered') s.mastered++;
    else if (p.status === 'leech') s.leech++;
    else if (p.status === 'reviewing') s.reviewing++;
    else s.learning++;
  }
  return s;
}

function getOverallStats() {
  const s = { newCount: 0, learning: 0, reviewing: 0, mastered: 0, leech: 0 };
  for (const ch of CHAPTERS) {
    for (const w of ch.words) {
      const p = progress[w.korean];
      if (!p) { s.newCount++; continue; }
      if (p.status === 'mastered') s.mastered++;
      else if (p.status === 'leech') s.leech++;
      else if (p.status === 'reviewing') s.reviewing++;
      else s.learning++;
    }
  }
  return s;
}

// ===== Get due review count per chapter =====
function getDueCounts() {
  const now = Date.now();
  const URGENT_THRESHOLD = 3 * DAY; // overdue by more than 3 days = urgent
  const result = [];
  let totalDue = 0;
  let urgent = 0;
  let normal = 0;
  for (let i = 0; i < CHAPTERS.length; i++) {
    let due = 0;
    for (const w of CHAPTERS[i].words) {
      const p = progress[w.korean];
      if (!p || p.status === 'leech') continue;
      if (p.nextReview && p.nextReview <= now) {
        due++;
        if (now - p.nextReview > URGENT_THRESHOLD) urgent++;
        else normal++;
      }
    }
    result.push(due);
    totalDue += due;
  }
  // Tomorrow's count: words whose nextReview is within the next 24h
  let tomorrow = 0;
  for (const ch of CHAPTERS) {
    for (const w of ch.words) {
      const p = progress[w.korean];
      if (!p || p.status === 'leech') continue;
      if (p.nextReview && p.nextReview > now && p.nextReview <= now + DAY) tomorrow++;
    }
  }
  return { perChapter: result, total: totalDue, urgent, normal, tomorrow };
}

// Leech session
function startLeechSession() {
  const queue = [];
  for (const ch of CHAPTERS) {
    for (const w of ch.words) {
      const p = progress[w.korean];
      if (p && p.status === 'leech') queue.push(w);
    }
  }
  shuffle(queue);
  if (queue.length === 0) return;

  sessionQueue = queue;
  currentIndex = 0;
  isFlipped = false;
  sessionCorrect = 0;
  sessionTotal = 0;
  sessionOriginalLength = queue.length;
  sessionRetryCount = {};
  currentChapter = -2; // special: leech session

  document.getElementById('headerTitle').textContent = '困难单词';
  renderCard();
}

// Start all due reviews across all chapters
function startAllDue() {
  sessionQueue = buildSessionQueue(-1);
  currentIndex = 0;
  isFlipped = false;
  sessionCorrect = 0;
  sessionTotal = 0;
  sessionOriginalLength = sessionQueue.length;
  sessionRetryCount = {};

// ===== Start Chapter Session =====
function startChapter(chapterIdx) {
  currentChapter = chapterIdx;
  sessionQueue = buildSessionQueue(chapterIdx);
  currentIndex = 0;
  isFlipped = false;
  sessionCorrect = 0;
  sessionTotal = 0;
  sessionOriginalLength = sessionQueue.length;
  sessionRetryCount = {};

  document.getElementById('headerTitle').textContent = `第 ${chapterIdx + 1} 章`;
  if (sessionQueue.length === 0) { showChapterComplete(); return; }
  renderCard();
}

// ===== Build Session Queue (interleaving + adaptive new word rate) =====
function buildSessionQueue(chapterIdx) {
  const now = Date.now();
  const words = chapterIdx === -1
    ? CHAPTERS.flatMap(ch => ch.words)
    : CHAPTERS[chapterIdx].words;

  // 1) Due reviews (exclude leech; include mastered if due for long-term review)
  const URGENT_THRESHOLD = 3 * DAY;
  const dueUrgent = [];
  const dueNormal = [];
  for (const w of words) {
    const p = progress[w.korean];
    if (!p || p.status === 'leech') continue;
    if (p.nextReview && p.nextReview <= now) {
      if (now - p.nextReview > URGENT_THRESHOLD) dueUrgent.push(w);
      else dueNormal.push(w);
    }
  }
  // Merge: urgent first, then normal; apply soft cap in all-chapter mode
  let due = [...dueUrgent, ...dueNormal];
  if (chapterIdx === -1) {
    due = due.slice(0, DAILY_REVIEW_CAP);
  }

  // 2) New words with adaptive count
  let maxNew = dailyNewLimit;
  if (due.length > 30) maxNew = Math.max(3, Math.floor(dailyNewLimit * 0.5));
  if (due.length > 60) maxNew = 1;
  if (due.length > 100) maxNew = 0;

  // In all-chapter mode, new words share the same daily cap as reviews
  if (chapterIdx === -1) {
    maxNew = Math.min(maxNew, Math.max(0, DAILY_REVIEW_CAP - due.length));
  }

  let newBatch = [];
  if (chapterIdx === -1) {
    // All-chapter mode: collect new words across chapters
    const allNew = words.filter(w => !progress[w.korean]);
    newBatch = allNew.slice(0, maxNew);
  } else {
    // Single chapter: find the first unlearned word from pointer onward,
    // then collect maxNew unlearned words sequentially
    const chapterKey = '_ch' + chapterIdx;
    const chMeta = progress[chapterKey] || { newIndex: 0 };
    let ptr = chMeta.newIndex;
    // If pointer is out of range, reset it and re-scan for unlearned words
    if (ptr >= words.length) {
      ptr = 0;
    }
    // Advance pointer past any already-learned words (e.g. from old version migration)
    while (ptr < words.length && progress[words[ptr].korean]) ptr++;
    // Collect the next batch of unlearned words (only if maxNew > 0)
    if (maxNew > 0) {
      for (let i = ptr; i < words.length && newBatch.length < maxNew; i++) {
        if (!progress[words[i].korean]) {
          newBatch.push(words[i]);
          ptr = i + 1; // advance pointer to just past this word
        }
      }
      progress[chapterKey] = { newIndex: ptr };
    }
  }

  // 3) Interleave: ~2 reviews : 1 new word
  return interleave(due, newBatch);
}

function interleave(reviews, newWords) {
  shuffle(reviews);
  shuffle(newWords);
  const queue = [];
  let ri = 0, ni = 0;
  while (ri < reviews.length || ni < newWords.length) {
    if (ri < reviews.length) queue.push(reviews[ri++]);
    if (ri < reviews.length) queue.push(reviews[ri++]);
    if (ni < newWords.length) queue.push(newWords[ni++]);
  }
  return queue;
}

  `;
}

function answer(known) {
  const word = sessionQueue[currentIndex];
  const now = Date.now();
  let p = progress[word.korean];

  if (!p) {
    p = { status: 'learning', stability: S0_AGAIN, difficulty: 0.3,
          nextReview: 0, lastReview: 0, reps: 0, lapses: 0, streak: 0 };
    progress[word.korean] = p;
  }

  sessionTotal++;
  const wasNew = p.reps === 0;
  if (known) {
    sessionCorrect++;
    onKnown(p, now);
    // New word consolidation: re-practice once more in this session
    if (wasNew && sessionQueue.length < SESSION_CARD_CAP
        && !sessionQueue.some((w, i) => i > currentIndex && w.korean === word.korean)) {
      sessionQueue.push(word);
    }
  } else {
    onForgotten(p, now, word);
  }

  saveProgress(true); // skip cloud sync during session; sync at session end
  currentIndex++;
  isFlipped = false;
  renderCard();
}

function onKnown(p, now) {
  const elapsedDays = p.lastReview > 0 ? (now - p.lastReview) / DAY : 0;

  if (p.reps === 0) {
    p.stability = S0_FIRST_OK;
    p.difficulty = 0.3;
  } else {
    p.difficulty = clamp(p.difficulty - DIFFICULTY_DECAY * (1 - p.difficulty), 0.1, 1);
    const df = 1 - DIFFICULTY_WEIGHT * p.difficulty;
    // retrievability: how much you remember based on forgetting curve
    const r = p.stability > 0 ? Math.exp(-elapsedDays / p.stability) : 0.5;
    const rSafe = clamp(r, 0.01, 1);
    // spacing effect: lower r at review time → larger stability growth
    // growth >= STABILITY_GROWTH when r is high (frequent reviews)
    // growth > STABILITY_GROWTH when r is low (long gap survived)
    const spacingBonus = Math.min(2.0, 1 + Math.max(0, -Math.log(rSafe)));
    p.stability = clamp(
      p.stability * STABILITY_GROWTH * df * spacingBonus,
      S0_AGAIN,
      STABILITY_MAX
    );
  }

  p.streak++;
  p.reps++;
  p.lastReview = now;

  const intervalDays = p.stability * RETENTION_FACTOR;
  p.nextReview = now + Math.max(MINUTE, intervalDays * DAY);

  // Leech rehabilitation
  if (p.status === 'leech' && p.streak >= LEECH_REHAB_STREAK) {
    p.status = 'learning';
    p.lapses = Math.max(0, p.lapses - 2);
  } else if (intervalDays >= MASTERED_INTERVAL_DAYS) {
    p.status = 'mastered';
  } else if (p.streak >= 2) {
    p.status = 'reviewing';
  } else {
    p.status = 'learning';
  }
}

function onForgotten(p, now, word) {
  p.stability = Math.max(S0_AGAIN, p.stability * STABILITY_SHRINK);
  p.difficulty = clamp(p.difficulty + DIFFICULTY_BOOST * (1 - p.difficulty), 0, 1);
  p.streak = 0;
  p.reps++;
  p.lapses++;
  p.lastReview = now;
  p.nextReview = now + MINUTE;
  p.status = p.lapses >= LEECH_THRESHOLD ? 'leech' : 'learning';

  // Re-append to current session for immediate re-practice (with limits)
  const key = word.korean;
  sessionRetryCount[key] = (sessionRetryCount[key] || 0) + 1;
  if (sessionRetryCount[key] <= MAX_RETRIES_PER_WORD && sessionQueue.length < SESSION_CARD_CAP
      && !sessionQueue.some((w, i) => i > currentIndex && w.korean === word.korean)) {
    sessionQueue.push(word);
  }
}

function formatInterval(days) {
  if (!days || days <= 0 || isNaN(days)) return '刚学';
  if (days < 1/24) return Math.round(days * 24 * 60) + '分钟';
  if (days < 1) return Math.round(days * 24) + '小时';
  return Math.round(days) + '天';
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function showChapterComplete() {
  const isMixed = currentChapter === -1;
  const isLeech = currentChapter === -2;
  const s = isMixed || isLeech ? getOverallStats() : getChapterStats(currentChapter);
  const totalWords = isMixed || isLeech ? CHAPTERS.reduce((sum, c) => sum + c.words.length, 0) : s.total;
  const title = isLeech ? '困难单词练习完成!'
    : isMixed ? '今日复习完成!'
    : `第 ${currentChapter + 1} 章学习完成!`;
  const subtitle = isLeech
    ? `剩余困难词: ${s.leech} 个`
    : isMixed
    ? `总进度: 已掌握 ${s.mastered}/${totalWords}`
    : `第 ${currentChapter + 1} 章已掌握 ${s.mastered}/${totalWords} 个单词`;
  // If chapter is fully mastered, show "返回首页" instead of "继续学习"
  const chapterDone = !isMixed && !isLeech && s.mastered === s.total;
  const btnText = isLeech || isMixed || chapterDone ? '返回首页' : '继续学习';
  const btnAction = isLeech || isMixed || chapterDone ? 'showChapterList()' : `startChapter(${currentChapter})`;
  const accuracy = sessionTotal > 0 ? Math.round(sessionCorrect / sessionTotal * 100) : 0;

  document.getElementById('app').innerHTML = `
    <div class="main">
      <button class="back-btn" onclick="showChapterList()">← 返回首页</button>
      <div class="session-complete">
        <h2>${title}</h2>
        <p>${subtitle}</p>
        <p style="margin-bottom:12px;">本次正确率: <strong>${accuracy}%</strong> (${sessionCorrect}/${sessionTotal})</p>
        <p style="margin-bottom:24px;">继续加油!</p>
        <button class="btn-primary" onclick="${btnAction}">${btnText}</button>
      </div>
    </div>
  `;

  // Save session record
  const today = new Date().toISOString().slice(0, 10);
  sessionHistory.push({
    date: today,
    chapter: isLeech ? 0 : currentChapter + 1,
    total: sessionOriginalLength,
    correct: sessionCorrect,
    answered: sessionTotal,
    timestamp: now()
  });
  saveProgress(); // sync progress + trigger cloud sync
  saveHistory();
}

// ===== History =====
function openHistory() {
  const content = document.getElementById('historyContent');

  if (sessionHistory.length === 0) {
    content.innerHTML = '<div class="no-history">还没有学习记录哦，开始学习吧!</div>';
  } else {
    // Aggregate by date + chapter
    const agg = {};
    for (const h of sessionHistory) {
      const key = `${h.date}|${h.chapter}`;
      if (!agg[key]) {
        agg[key] = { date: h.date, chapter: h.chapter, sessions: 0, totalWords: 0, correct: 0, answered: 0 };
      }
      agg[key].sessions++;
      agg[key].totalWords += h.total;
      agg[key].correct += h.correct || 0;
      agg[key].answered += h.answered || 0;
    }

    const rows = Object.values(agg).sort((a, b) => b.date.localeCompare(a.date));

    // Chapter accuracy
    let html = '<table class="history-table"><thead><tr><th>日期</th><th>章节</th><th>学习次数</th><th>复习词数</th><th>正确率</th></tr></thead><tbody>';
    for (const r of rows) {
      const acc = r.answered > 0 ? Math.round(r.correct / r.answered * 100) + '%' : '-';
      html += `<tr><td>${r.date}</td><td>${r.chapter === 0 ? '困难词' : '第' + r.chapter + '章'}</td><td>${r.sessions}</td><td>${r.totalWords}</td><td>${acc}</td></tr>`;
    }
    html += '</tbody></table>';

    // Chapter mastery overview
    html += '<h3 style="margin:24px 0 12px;font-size:16px;">各章掌握率</h3>';
    html += '<table class="history-table"><thead><tr><th>章节</th><th>总词数</th><th>已掌握</th><th>掌握率</th></tr></thead><tbody>';
    for (let i = 0; i < CHAPTERS.length; i++) {
      const s = getChapterStats(i);
      const pct = s.total > 0 ? Math.round(s.mastered / s.total * 100) : 0;
      const rateClass = pct >= 80 ? 'rate-good' : pct >= 50 ? 'rate-ok' : 'rate-bad';
      html += `<tr><td>第${i + 1}章</td><td>${s.total}</td><td>${s.mastered}</td><td class="${rateClass}">${pct}%</td></tr>`;
    }
    html += '</tbody></table>';
    content.innerHTML = html;
  }

  document.getElementById('historyModal').classList.add('active');
}

function closeHistory() {
  document.getElementById('historyModal').classList.remove('active');
}

// ===== Settings =====
function openSettings() {
  document.getElementById('syncTokenInput').value = syncToken;
  document.getElementById('syncStatus').textContent = syncToken ? '已配置' : '未配置（仅本地存储）';
  document.getElementById('settingsModal').classList.add('active');
}

function closeSettings() {
  saveSettings();
  const newToken = document.getElementById('syncTokenInput').value.trim();
  if (newToken && newToken !== syncToken) {
    syncToken = newToken;
    localStorage.setItem('korean_vocab_sync_token', syncToken);
    syncFromCloud().then(() => { showChapterList(); });
  }
  document.getElementById('settingsModal').classList.remove('active');
}

function updateRangeDisplay() {
  const v = document.getElementById('newWordCount').value;
  document.getElementById('rangeValue').textContent = v + ' 个';
}

function exportProgress() {
  const data = {
    progress: progress,
    history: sessionHistory,
    dailyNewLimit: dailyNewLimit,
    exportDate: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'korean-vocab-backup-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importProgress(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.progress) { alert('文件格式不正确'); return; }
      if (!confirm('导入将覆盖当前进度，确定继续？')) return;
      progress = data.progress;
      sessionHistory = data.history || [];
      saveProgress();
      saveHistory();
      alert('导入成功！');
      closeSettings();
      showChapterList();
    } catch (err) {
      alert('文件解析失败: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetProgress() {
  if (confirm('确定要重置所有学习进度吗？此操作不可恢复！')) {
    progress = { _resetTs: Date.now() };
    sessionHistory = [];
    saveProgress();
    saveHistory();
    closeSettings();
    showChapterList();
  }
}

// ===== Keyboard =====
document.addEventListener('keydown', (e) => {
  if (document.getElementById('settingsModal').classList.contains('active')) return;
  if (document.getElementById('historyModal').classList.contains('active')) return;
  if (currentChapter === null) return;
  if (currentIndex >= sessionQueue.length) return;

  if (e.code === 'Space') {
    e.preventDefault();
    if (!isFlipped) flipCard();
  } else if (e.code === 'ArrowRight' && isFlipped) {
    answer(true);
  } else if (e.code === 'ArrowLeft' && isFlipped) {
    answer(false);
  }
});

// ===== Util =====
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function now() { return Date.now(); }

// ===== Start =====
init();
</script>
